# This is workflow name
name: Hello Workflow

# runs on a trigger
on: 
  push:
    branches: [main]

#These are the jobs inside the workflow
jobs:

# This is the name of the job
  greet:

  # this is github runner, each jobs runs on a runner
  runs-on: ubuntu-latest
    steps:
      -name: say hello to users
      -run: echo "Hello Dosto"

      -name: say Hello to username
      -run: echo "Hello $USER"
