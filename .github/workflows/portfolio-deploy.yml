# Problem:- Deploy their own portfolio website for FREE with GitHub Actions, & GitOps CICD
name: Portfolio

on:
  push:
    branches: [main]

  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  pages: write      # to deploy to Pages
  id-token: write   # to verify the deployment originates from an appropriate source

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{steps.deployment.outputs.page_url}}
        steps:
          # clones or checks out the code where this workflow is written
          # Get access to your Portfolio code via pre-built actions
          # STEP - 1
          - name: Checkout Code
            uses: actions/checkout@v4

          # Setup Github Pages
          # STEP - 2
          - name: Setup GitHub Pages
            uses: actions/configure-pages@v4
        
          # Static code artifacts
          # STEP - 3
          - name: Upload static files
            uses: actions/upload-pages-artifact@v4
            with:
                path: "."
        
          # Deploy to Github pages
          # STEP - 4
          - name: Deploy to Github pages
            id: deployment
            uses: actions/deploy-pages@v4

