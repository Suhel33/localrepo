# This is workflow name
name: Hello Workflow
# Runs on a trigger
on:
  push:
    branches: [main]
# These are the jobs inside the workflow
jobs:
  # This is the name of the job
  greet:
    # This is github runner. Each jobs run on a runner (server-> ubuntu/windows/macos etc)
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello Dosto"

      - name: say hello to username
        run: echo "Hello $USER"
